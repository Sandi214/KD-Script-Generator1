<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Admin - Generate License KD Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', monospace;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            padding: 30px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            color: #e02020;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .card h2 {
            color: #f0a500;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: #2a2a2a;
            border: 2px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
        }

        .form-group input:focus {
            border-color: #e02020;
            outline: none;
        }

        button {
            background: #e02020;
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #ff4444;
            transform: scale(1.02);
        }

        .license-result {
            background: #0a2a1a;
            border: 2px solid #2ecc71;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .license-key {
            font-size: 24px;
            font-family: monospace;
            letter-spacing: 3px;
            background: #000;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 15px 0;
            color: #2ecc71;
            word-break: break-all;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th {
            text-align: left;
            padding: 12px;
            background: #2a2a2a;
            color: #f0a500;
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid #333;
        }

        .badge-active {
            background: #2ecc71;
            color: #000;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .badge-used {
            background: #f0a500;
            color: #000;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .btn-small {
            background: #333;
            padding: 5px 10px;
            font-size: 0.8rem;
            margin-right: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔐 ADMIN PANEL - LICENSE GENERATOR</h1>

        <!-- CARD GENERATE LICENSE -->
        <div class="card">
            <h2>➕ Generate License Baru</h2>

            <div class="form-group">
                <label>Nama Pembeli</label>
                <input type="text" id="nama" placeholder="Contoh: Budi Santoso">
            </div>

            <div class="form-group">
                <label>Email Pembeli</label>
                <input type="email" id="email" placeholder="budi@gmail.com">
            </div>

            <div class="form-group">
                <label>No WhatsApp</label>
                <input type="text" id="wa" placeholder="6281234567890">
            </div>

            <div class="form-group">
                <label>Tier License</label>
                <select id="tier"
                    style="width:100%; padding:12px; background:#2a2a2a; color:#fff; border:2px solid #333; border-radius:10px;">
                    <option value="basic">Basic - Rp99.000</option>
                    <option value="pro">Pro - Rp250.000</option>
                    <option value="lifetime">Lifetime - Rp500.000</option>
                </select>
            </div>

            <div class="form-group">
                <label>ID Pembayaran (DANA/Transfer)</label>
                <input type="text" id="payment" placeholder="TRX123456">
            </div>

            <button onclick="generateLicense()">🔑 Generate License Key</button>

            <!-- HASIL GENERATE -->
            <div id="resultBox" class="license-result">
                <h3 style="color:#2ecc71;">✅ License Berhasil Digenerate!</h3>
                <div class="license-key" id="licenseKey">KD-PRO-XXXX-XXXX-XXXX</div>
                <div style="display:flex; gap:10px; justify-content:center;">
                    <button class="btn-small" onclick="copyLicense()">📋 Copy License</button>
                    <button class="btn-small" onclick="sendWA()">📱 Kirim via WA</button>
                    <button class="btn-small" onclick="sendEmail()">📧 Kirim via Email</button>
                </div>
                <p style="text-align:center; margin-top:15px; color:#888; font-size:12px;">
                    Simpan license ini, kirim ke pembeli
                </p>
            </div>
        </div>

        <!-- CARD DATABASE LICENSE -->
        <div class="card">
            <h2>📋 Database License (Tersimpan di Browser)</h2>

            <table class="table" id="licenseTable">
                <thead>
                    <tr>
                        <th>License Key</th>
                        <th>Pembeli</th>
                        <th>Tier</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="licenseBody">
                    <!-- Akan diisi JavaScript -->
                </tbody>
            </table>

            <div style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="exportDatabase()">💾 Export Database</button>
                <button onclick="importDatabase()">📂 Import Database</button>
                <button onclick="backupDatabase()">⬇️ Download Backup</button>
            </div>
        </div>

        <!-- CARD STATISTIK -->
        <div class="card">
            <h2>📊 Statistik</h2>
            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px; text-align:center;">
                <div>
                    <div style="font-size:32px; color:#e02020;" id="totalLicense">0</div>
                    <div style="color:#888;">Total License</div>
                </div>
                <div>
                    <div style="font-size:32px; color:#2ecc71;" id="activeLicense">0</div>
                    <div style="color:#888;">Active</div>
                </div>
                <div>
                    <div style="font-size:32px; color:#f0a500;" id="usedLicense">0</div>
                    <div style="color:#888;">Terpakai</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DATABASE SIMPAN DI LOCALSTORAGE
        let database = {
            licenses: []
        };

        // LOAD DATABASE SAAT HALAMAN DIBUKA
        function loadDatabase() {
            const saved = localStorage.getItem('kd_license_db');
            if (saved) {
                database = JSON.parse(saved);
            }
            updateTable();
        }

        // SIMPAN DATABASE
        function saveDatabase() {
            localStorage.setItem('kd_license_db', JSON.stringify(database));
            updateTable();
        }

        // GENERATE LICENSE KEY UNIK
        function generateLicenseKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = 'KD-';

            // Generate 4 blok
            for (let blok = 0; blok < 3; blok++) {
                for (let i = 0; i < 4; i++) {
                    result += chars[Math.floor(Math.random() * chars.length)];
                }
                if (blok < 2) result += '-';
            }

            return result;
        }

        // FUNGSI GENERATE LICENSE
        function generateLicense() {
            // Ambil data dari form
            const nama = document.getElementById('nama').value;
            const email = document.getElementById('email').value;
            const wa = document.getElementById('wa').value;
            const tier = document.getElementById('tier').value;
            const payment = document.getElementById('payment').value;

            // Validasi
            if (!nama || !email) {
                alert('Nama dan Email harus diisi!');
                return;
            }

            // Generate license
            const licenseKey = generateLicenseKey();

            // Simpan ke database
            const newLicense = {
                key: licenseKey,
                nama: nama,
                email: email,
                wa: wa,
                tier: tier,
                payment: payment,
                generated: new Date().toISOString(),
                status: 'active',
                used: false,
                usedDate: null,
                machineId: null
            };

            database.licenses.push(newLicense);
            saveDatabase();

            // Tampilkan hasil
            document.getElementById('licenseKey').textContent = licenseKey;
            document.getElementById('resultBox').style.display = 'block';

            // Simpan data untuk kirim WA
            window.currentLicense = newLicense;

            // Reset form
            document.getElementById('nama').value = '';
            document.getElementById('email').value = '';
            document.getElementById('wa').value = '';
            document.getElementById('payment').value = '';
        }

        // UPDATE TABEL LICENSE
        function updateTable() {
            const tbody = document.getElementById('licenseBody');
            tbody.innerHTML = '';

            let total = 0;
            let active = 0;
            let used = 0;

            database.licenses.forEach(lic => {
                total++;
                if (lic.status === 'active') active++;
                if (lic.used) used++;

                const row = `
                    <tr>
                        <td><strong>${lic.key}</strong><br><small style="color:#888;">${lic.email}</small></td>
                        <td>${lic.nama}<br><small style="color:#888;">${lic.wa || '-'}</small></td>
                        <td>${lic.tier}</td>
                        <td>
                            ${lic.used ?
                        '<span class="badge-used">🔷 Terpakai</span>' :
                        '<span class="badge-active">✅ Active</span>'
                    }
                        </td>
                        <td>
                            <button class="btn-small" onclick="copyLicenseKey('${lic.key}')">Copy</button>
                            <button class="btn-small" onclick="deactivateLicense('${lic.key}')">Nonaktif</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            // Update statistik
            document.getElementById('totalLicense').textContent = total;
            document.getElementById('activeLicense').textContent = active;
            document.getElementById('usedLicense').textContent = used;
        }

        // COPY LICENSE
        function copyLicense() {
            const key = document.getElementById('licenseKey').textContent;
            navigator.clipboard.writeText(key);
            alert('License copied!');
        }

        function copyLicenseKey(key) {
            navigator.clipboard.writeText(key);
            alert('License copied!');
        }

        // KIRIM VIA WA
        function sendWA() {
            const lic = window.currentLicense;
            if (!lic) return;

            const pesan = `Halo *${lic.nama}*,

Terima kasih sudah membeli *KD Script Generator*!

Berikut adalah license key kamu:
\`\`\`
${lic.key}
\`\`\`

**Cara pakai:**
1. Download file premium yang sudah dikirim
2. Buka file tersebut
3. Masukkan license key di atas
4. Nikmati fitur unlimited!

Simpan license ini baik-baik ya.

Support: wa.me/6281234567890`;

            const url = `https://wa.me/${lic.wa}?text=${encodeURIComponent(pesan)}`;
            window.open(url, '_blank');
        }

        // KIRIM VIA EMAIL (manual)
        function sendEmail() {
            const lic = window.currentLicense;
            if (!lic) return;

            // Buka default email
            const subject = 'License Key KD Script Generator';
            const body = `Halo ${lic.nama},\n\nLicense key kamu: ${lic.key}\n\nCara pakai:\n1. Download file premium\n2. Masukkan license key\n3. Generate unlimited\n\nSupport: wa.me/6281234567890`;

            window.location.href = `mailto:${lic.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        }

        // DEACTIVATE LICENSE
        function deactivateLicense(key) {
            if (confirm('Nonaktifkan license ini?')) {
                const idx = database.licenses.findIndex(l => l.key === key);
                if (idx !== -1) {
                    database.licenses[idx].status = 'inactive';
                    saveDatabase();
                }
            }
        }

        // EXPORT DATABASE
        function exportDatabase() {
            const dataStr = JSON.stringify(database, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `kd-license-backup-${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
        }

        // IMPORT DATABASE
        function importDatabase() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function (e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function (e) {
                    try {
                        database = JSON.parse(e.target.result);
                        saveDatabase();
                        alert('Database diimport!');
                    } catch (err) {
                        alert('File tidak valid');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // BACKUP DATABASE
        function backupDatabase() {
            exportDatabase();
        }

        // LOAD SAAT MULAI
        loadDatabase();
    </script>
</body>

</html>
